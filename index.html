<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Form Upload Bukti Submit Jurnal & LoA">
    <meta name="theme-color" content="#6d28d9">
    <title>✨ Upload Bukti Jurnal & LoA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: hsl(260, 80%, 55%);
            --accent-1: hsl(290, 75%, 55%);
            --accent-2: hsl(320, 70%, 60%);
            --bg: hsl(260, 30%, 96%);
            --card: rgba(255,255,255,0.88);
            --text: #1a1535;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 14px;
            --font: 'Plus Jakarta Sans', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: linear-gradient(160deg, var(--bg), hsl(280,25%,94%), hsl(240,20%,92%));
            min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
            padding: 10px; color: var(--text);
        }
        .form-container {
            width: 100%; max-width: 680px; background: var(--card);
            backdrop-filter: blur(22px); border-radius: 32px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.1); padding: 30px 25px;
            margin-top: 10px; animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .form-header { text-align:center; margin-bottom:25px; }
        .form-header h1 { font-size:1.6rem; font-weight:800; background: linear-gradient(135deg, var(--primary), var(--accent-1), var(--accent-2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .semester-badge { display:inline-flex; gap:8px; background:#ede9fe; padding:8px 16px; border-radius:20px; font-size:0.75rem; font-weight:700; color:#4c1d95; margin-bottom:20px; }
        .form-group { margin-bottom:15px; }
        .form-label { display:flex; gap:6px; font-weight:700; font-size:0.7rem; text-transform:uppercase; margin-bottom:4px; }
        .form-input { width:100%; padding:12px 14px; border:2px solid #e5e7eb; border-radius:10px; background:#fafbfc; font-size:0.87rem; outline:none; transition:0.2s; }
        .form-input:focus { border-color:var(--primary); background:#fff; }
        .upload-area { display:flex; align-items:center; justify-content:center; gap:10px; padding:16px; border:2.5px dashed #d1d5db; border-radius:var(--radius); background:#fafbfc; cursor:pointer; transition:0.2s; position:relative; }
        .upload-area:hover { border-color:var(--primary); background:#f5f3ff; }
        .upload-area.has-file { border-color:var(--success); background:#f0fdf7; border-style:solid; }
        .upload-area input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
        .preview-container { display:none; margin-top:8px; border:2px solid #e5e7eb; border-radius:var(--radius); overflow:hidden; }
        .preview-container.show { display:block; }
        .preview-header { display:flex; justify-content:space-between; padding:8px 12px; background:#f9fafb; border-bottom:1px solid #e5e7eb; }
        .preview-filename { font-weight:700; font-size:0.75rem; word-break:break-all; }
        .preview-remove { background:#fef2f2; color:var(--danger); border:1px solid #fecaca; border-radius:18px; padding:5px 12px; cursor:pointer; font-weight:700; font-size:0.7rem; }
        .preview-content { display:flex; align-items:center; justify-content:center; background:#fafafa; padding:6px; max-height:280px; overflow:auto; }
        .preview-content img { max-width:100%; max-height:260px; }
        .submit-btn { width:100%; padding:14px; font-weight:700; color:#fff; background:linear-gradient(135deg, var(--primary), var(--accent-1)); border:none; border-radius:var(--radius); cursor:pointer; margin-top:12px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:0.92rem; }
        .submit-btn:disabled { background:#d1d5db; cursor:not-allowed; }
        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-130px); background:#1a1535; color:#fff; padding:11px 20px; border-radius:28px; font-size:0.8rem; font-weight:600; z-index:2000; transition:transform 0.4s; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.error-toast { background:#dc2626; }
        .toast.success-toast { background:#059669; }
        .modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,0.6); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; visibility:hidden; transition:0.3s; }
        .modal-overlay.active { opacity:1; visibility:visible; }
        .modal-dialog { background:#fff; border-radius:20px; padding:30px; text-align:center; max-width:400px; width:100%; }
        .spinner { width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h1>Upload Bukti Submit Jurnal & LoA</h1>
        <p style="color:#5b5480; font-size:0.82rem;">Form Akademik</p>
    </div>
    <div style="text-align:center;">
        <span class="semester-badge" id="semesterBadge">
            <span>📅⭐</span> <span id="semesterLabel">Memuat...</span>
        </span>
    </div>

    <form id="uploadForm" novalidate>
        <div class="form-group">
            <label class="form-label"><span>✎</span> Nama Lengkap</label>
            <input type="text" class="form-input" id="namaLengkap" name="namaLengkap" placeholder="Nama lengkap Anda" maxlength="100">
        </div>
        <div class="form-group">
            <label class="form-label"><span>🆔</span> NIM <span style="color:var(--danger);">*</span></label>
            <input type="text" class="form-input" id="nim" name="nim" placeholder="Contoh: 202203001" maxlength="9" required inputmode="numeric" pattern="[0-9]{9}">
            <div style="color:var(--danger); font-size:0.7rem; display:none;" id="nimError"></div>
        </div>
        <div class="form-group">
            <label class="form-label"><span>📖</span> Judul Tesis</label>
            <input type="text" class="form-input" id="judulTesis" name="judulTesis" placeholder="Judul tesis">
        </div>
        <div class="form-group">
            <label class="form-label"><span>📝</span> Judul Artikel</label>
            <input type="text" class="form-input" id="judulArtikel" name="judulArtikel" placeholder="Judul artikel">
        </div>

        <hr style="margin:20px 0; border-top:1.5px solid #e5e7eb;">

        <div class="form-group">
            <label class="form-label"><span>📤</span> Bukti Submit Jurnal (PDF/Image)</label>
            <div class="upload-area" id="uploadAreaBukti">
                <span>☁️</span> <span>Pilih File</span> <small>(PDF/JPG/PNG)</small>
                <input type="file" id="fileBuktiSubmit" name="fileBuktiSubmit" accept=".pdf,.jpg,.jpeg,.png" aria-label="Upload Bukti Submit Jurnal">
            </div>
            <div class="preview-container" id="previewBukti">
                <div class="preview-header">
                    <span class="preview-filename" id="previewBuktiName"></span>
                    <button type="button" class="preview-remove" id="removeBukti"><span>🗑️</span> Hapus</button>
                </div>
                <div class="preview-content" id="previewBuktiContent"></div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label"><span>🔗</span> Link Sinta / Akreditasi</label>
            <input type="url" class="form-input" id="linkSinta" name="linkSinta" placeholder="https://sinta.kemdikbud.go.id/...">
        </div>

        <div class="form-group">
            <label class="form-label"><span>📤</span> Dokumen LoA (PDF/Image)</label>
            <div class="upload-area" id="uploadAreaLoA">
                <span>☁️</span> <span>Pilih File</span> <small>(PDF/JPG/PNG)</small>
                <input type="file" id="fileLoA" name="fileLoA" accept=".pdf,.jpg,.jpeg,.png" aria-label="Upload Dokumen LoA">
            </div>
            <div class="preview-container" id="previewLoA">
                <div class="preview-header">
                    <span class="preview-filename" id="previewLoAName"></span>
                    <button type="button" class="preview-remove" id="removeLoA"><span>🗑️</span> Hapus</button>
                </div>
                <div class="preview-content" id="previewLoAContent"></div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label"><span>📰</span> Nama Jurnal</label>
            <input type="text" class="form-input" id="namaJurnal" name="namaJurnal" placeholder="Nama jurnal">
        </div>
        <div class="form-group">
            <label class="form-label"><span>🔗</span> Link Jurnal / LoA</label>
            <input type="url" class="form-input" id="linkJurnalLoA" name="linkJurnalLoA" placeholder="https://...">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            <span>📨</span> Kirim Dokumen
        </button>
    </form>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="successModal">
    <div class="modal-dialog">
        <div style="font-size:3rem;">✅</div>
        <h2>Upload Berhasil!</h2>
        <div style="text-align:left; background:#f9fafb; padding:12px; border-radius:8px; margin:12px 0;" id="modalDetail"></div>
        <button class="modal-close-btn" style="margin-top:12px; padding:10px 24px; background:var(--primary); color:#fff; border:none; border-radius:28px; cursor:pointer;" id="modalCloseBtn">Selesai</button>
    </div>
</div>

<script>
    (function() {
        // Ganti dengan URL Web App terbaru setelah deploy ulang
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzv_FrKwTRuE9ll_F7nxKd2FP1rYwkAWopsaLvdfJPBVoxS6MMteDMp0KBtr_MA88xe/exec';
        const MAX_SIZE = 10 * 1024 * 1024;

        // DOM
        const form = document.getElementById('uploadForm');
        const nim = document.getElementById('nim');
        const nimErr = document.getElementById('nimError');
        const toast = document.getElementById('toast');
        const modal = document.getElementById('successModal');
        const modalDetail = document.getElementById('modalDetail');
        const semLabel = document.getElementById('semesterLabel');
        const submitBtn = document.getElementById('submitBtn');

        const fileBukti = document.getElementById('fileBuktiSubmit');
        const areaBukti = document.getElementById('uploadAreaBukti');
        const prevBukti = document.getElementById('previewBukti');
        const prevBuktiName = document.getElementById('previewBuktiName');
        const prevBuktiCont = document.getElementById('previewBuktiContent');
        const rmBukti = document.getElementById('removeBukti');

        const fileLoA = document.getElementById('fileLoA');
        const areaLoA = document.getElementById('uploadAreaLoA');
        const prevLoA = document.getElementById('previewLoA');
        const prevLoAName = document.getElementById('previewLoAName');
        const prevLoACont = document.getElementById('previewLoAContent');
        const rmLoA = document.getElementById('removeLoA');

        // Semester
        function getSemester() {
            const now = new Date();
            const m = now.getMonth();
            const y = now.getFullYear();
            if (m >= 6 && m <= 11) {
                return { label: `Semester Ganjil ${y}/${y+1}`, folderName: `Semester Ganjil ${y}-${y+1}`, code: `GANJIL_${y}_${y+1}` };
            } else {
                return { label: `Semester Genap ${y-1}/${y}`, folderName: `Semester Genap ${y-1}-${y}`, code: `GENAP_${y-1}_${y}` };
            }
        }
        const semester = getSemester();
        semLabel.textContent = semester.label;

        // Toast
        let toastTimer;
        function showToast(msg, type = '') {
            clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // NIM validation
        nim.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0,9);
            validateNIM();
        });
        function validateNIM() {
            const v = nim.value.trim();
            nimErr.style.display = 'none';
            if (!v) { nimErr.textContent = 'NIM wajib diisi'; nimErr.style.display = 'block'; return false; }
            if (!/^\d{9}$/.test(v)) { nimErr.textContent = 'Harus 9 digit'; nimErr.style.display = 'block'; return false; }
            const tahun = v.substr(0,4);
            const prodi = v.substr(4,2);
            const no = v.substr(6,3);
            if (/03/.test(tahun)) { nimErr.textContent = 'Tahun tidak boleh mengandung 03'; nimErr.style.display = 'block'; return false; }
            if (prodi !== '03') { nimErr.textContent = 'Harus terdapat 03 setelah tahun'; nimErr.style.display = 'block'; return false; }
            if (/03/.test(no)) { nimErr.textContent = 'Nomor urut tidak boleh mengandung 03'; nimErr.style.display = 'block'; return false; }
            return true;
        }

        // Preview file
        function tampilkanPreview(file, area, prevWrap, prevName, prevCont) {
            if (!file) return;
            if (file.size > MAX_SIZE) {
                showToast('Ukuran file > 10MB', 'error-toast');
                return;
            }
            const ext = file.name.split('.').pop().toLowerCase();
            if (!['pdf','jpg','jpeg','png'].includes(ext)) {
                showToast('Format tidak didukung', 'error-toast');
                return;
            }
            area.classList.add('has-file');
            prevName.textContent = file.name;
            prevWrap.classList.add('show');
            if (['jpg','jpeg','png'].includes(ext)) {
                const reader = new FileReader();
                reader.onload = e => prevCont.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                reader.readAsDataURL(file);
            } else {
                prevCont.innerHTML = `<div style="padding:20px; text-align:center;">📄 ${file.name}</div>`;
            }
        }

        function hapusPreview(input, area, prevWrap, prevCont) {
            input.value = '';
            area.classList.remove('has-file');
            prevWrap.classList.remove('show');
            prevCont.innerHTML = '';
        }

        fileBukti.addEventListener('change', () => {
            if (fileBukti.files.length) tampilkanPreview(fileBukti.files[0], areaBukti, prevBukti, prevBuktiName, prevBuktiCont);
        });
        rmBukti.addEventListener('click', (e) => {
            e.stopPropagation();
            hapusPreview(fileBukti, areaBukti, prevBukti, prevBuktiCont);
        });

        fileLoA.addEventListener('change', () => {
            if (fileLoA.files.length) tampilkanPreview(fileLoA.files[0], areaLoA, prevLoA, prevLoAName, prevLoACont);
        });
        rmLoA.addEventListener('click', (e) => {
            e.stopPropagation();
            hapusPreview(fileLoA, areaLoA, prevLoA, prevLoACont);
        });

        // Drag & drop
        function setupDrag(area, input, prevWrap, prevName, prevCont) {
            area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
            area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
            area.addEventListener('drop', e => {
                e.preventDefault();
                area.classList.remove('drag-over');
                if (e.dataTransfer.files.length) {
                    input.files = e.dataTransfer.files;
                    tampilkanPreview(e.dataTransfer.files[0], area, prevWrap, prevName, prevCont);
                }
            });
        }
        setupDrag(areaBukti, fileBukti, prevBukti, prevBuktiName, prevBuktiCont);
        setupDrag(areaLoA, fileLoA, prevLoA, prevLoAName, prevLoACont);

        // SUBMIT
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!validateNIM()) {
                showToast('Periksa NIM', 'error-toast');
                nim.focus();
                return;
            }

            const hasBukti = fileBukti.files.length > 0;
            const hasLoA = fileLoA.files.length > 0;
            const linkSinta = document.getElementById('linkSinta').value.trim();
            const linkJurnal = document.getElementById('linkJurnalLoA').value.trim();

            if (!hasBukti && !hasLoA && !linkSinta && !linkJurnal) {
                if (!confirm('Tidak ada file/link. Lanjutkan?')) return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Mengirim...';

            try {
                const fd = new FormData();
                fd.append('namaLengkap', document.getElementById('namaLengkap').value.trim() || 'NN');
                fd.append('nim', nim.value.trim());
                fd.append('judulTesis', document.getElementById('judulTesis').value.trim());
                fd.append('judulArtikel', document.getElementById('judulArtikel').value.trim());
                fd.append('linkSinta', linkSinta);
                fd.append('namaJurnal', document.getElementById('namaJurnal').value.trim());
                fd.append('linkJurnalLoA', linkJurnal);
                fd.append('semester', semester.folderName);
                fd.append('semesterCode', semester.code);
                fd.append('timestamp', new Date().toISOString());

                if (hasBukti) {
                    fd.append('fileBuktiSubmit', fileBukti.files[0]);
                    fd.append('fileBuktiSubmitName', fileBukti.files[0].name);
                    console.log('📎 Bukti:', fileBukti.files[0].name, fileBukti.files[0].size);
                } else { console.warn('⚠️ Tidak ada file bukti'); }
                if (hasLoA) {
                    fd.append('fileLoA', fileLoA.files[0]);
                    fd.append('fileLoAName', fileLoA.files[0].name);
                    console.log('📎 LoA:', fileLoA.files[0].name, fileLoA.files[0].size);
                } else { console.warn('⚠️ Tidak ada file loa'); }

                console.log('🚀 Mengirim FormData...');
                for (let pair of fd.entries()) {
                    console.log(pair[0], pair[1] instanceof File ? `[File: ${pair[1].name}]` : pair[1]);
                }

                const resp = await fetch(GAS_URL, { method: 'POST', body: fd });
                if (!resp.ok) throw new Error('Server error: ' + resp.status);
                const result = await resp.json();
                console.log('📬', result);

                if (result.success) {
                    modalDetail.innerHTML = `
                        <strong>Nama:</strong> ${escapeHTML(result.data?.namaLengkap || '')}<br>
                        <strong>NIM:</strong> ${result.data?.nim || ''}<br>
                        <strong>File Bukti:</strong> ${result.data?.fileLinks?.buktiSubmit ? '✅ Terupload' : '❌ Tidak ada'}<br>
                        <strong>File LoA:</strong> ${result.data?.fileLinks?.loa ? '✅ Terupload' : '❌ Tidak ada'}
                    `;
                    modal.classList.add('active');
                    showToast('✅ Berhasil!', 'success-toast');
                    form.reset();
                    hapusPreview(fileBukti, areaBukti, prevBukti, prevBuktiCont);
                    hapusPreview(fileLoA, areaLoA, prevLoA, prevLoACont);
                } else {
                    throw new Error(result.message || 'Gagal');
                }
            } catch (err) {
                console.error('❌', err);
                showToast('❌ ' + err.message, 'error-toast');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>📨</span> Kirim Dokumen';
            }
        });

        document.getElementById('modalCloseBtn').addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

        function escapeHTML(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }
    })();
</script>
</body>
</html>
