<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Form Upload Bukti Submit Jurnal & LoA - Secure & Elegant">
    <meta name="theme-color" content="#6d28d9">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <title>✨ Upload Bukti Jurnal & LoA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           GLOBAL STYLES (dipertahankan sepenuhnya)
           ============================================================ */
        :root {
            --hue: 260;
            --primary: hsl(var(--hue), 80%, 55%);
            --primary-light: hsl(var(--hue), 90%, 65%);
            --primary-dark: hsl(var(--hue), 80%, 35%);
            --accent-1: hsl(calc(var(--hue) + 30), 75%, 55%);
            --accent-2: hsl(calc(var(--hue) + 60), 70%, 60%);
            --bg-start: hsl(var(--hue), 30%, 96%);
            --bg-mid: hsl(calc(var(--hue) + 20), 25%, 94%);
            --bg-end: hsl(calc(var(--hue) - 20), 20%, 92%);
            --card-bg: rgba(255, 255, 255, 0.88);
            --card-border: rgba(255, 255, 255, 0.7);
            --text-primary: #1a1535;
            --text-secondary: #5b5480;
            --text-muted: #a8a3c0;
            --success: #10b981;
            --danger: #ef4444;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 16px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.04);
            --shadow-lg: 0 16px 32px rgba(0,0,0,0.08), 0 8px 16px rgba(0,0,0,0.04);
            --shadow-xl: 0 24px 48px rgba(0,0,0,0.1), 0 12px 24px rgba(0,0,0,0.05);
            --shadow-glow: 0 0 0 4px rgba(109, 40, 217, 0.12);
            --shadow-glow-lg: 0 0 40px rgba(109, 40, 217, 0.15);
            --radius-xs: 8px;
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-2xl: 32px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --glass-blur: blur(22px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
        body {
            font-family: var(--font);
            background: linear-gradient(160deg, var(--bg-start), var(--bg-mid), var(--bg-end));
            min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
            color: var(--text-primary); line-height: 1.6; padding: 10px;
            position: relative; overflow-x: hidden;
        }
        .form-container {
            width: 100%; max-width: 680px; background: var(--card-bg); backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-2xl); box-shadow: var(--shadow-xl), var(--shadow-glow-lg);
            padding: clamp(20px, 4vw, 36px); margin: 10px auto 30px; position: relative; z-index: 1;
            border: 1.5px solid var(--card-border); animation: cardEntry 0.6s ease forwards;
        }
        @keyframes cardEntry { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .form-container::before {
            content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 4px;
            border-radius: 0 0 20px 20px;
            background: linear-gradient(90deg, var(--primary), var(--accent-1), var(--accent-2), var(--primary));
            background-size: 300% 100%; animation: gradientFlow 4s ease-in-out infinite;
            box-shadow: 0 4px 20px rgba(109, 40, 217, 0.3);
        }
        @keyframes gradientFlow { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .form-header { text-align: center; margin-bottom: 20px; padding-top: 8px; }
        .form-header .logo-wrapper {
            display: inline-flex; align-items: center; justify-content: center; width: 90px; height: 90px; margin-bottom: 12px;
            animation: logoFloat 3s ease-in-out infinite;
        }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .form-header .logo-wrapper img { width: 100%; height: 100%; object-fit: contain; border-radius: 24px; box-shadow: 0 12px 32px rgba(109, 40, 217, 0.3); background: white; padding: 8px; }
        .form-header .logo-wrapper::after {
            content: ''; position: absolute; inset: -10px; border-radius: 30px; border: 2.5px dashed rgba(139, 92, 246, 0.35);
            animation: spinSlow 10s linear infinite;
        }
        @keyframes spinSlow { to { transform: rotate(360deg); } }
        .form-header h1 {
            font-size: clamp(1.2rem, 2.5vw, 1.5rem); font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent-1), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .semester-badge {
            display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, hsl(var(--hue), 30%, 94%), hsl(var(--hue), 25%, 90%));
            color: var(--primary-dark); font-size: 0.75rem; font-weight: 700; padding: 7px 16px; border-radius: 25px; margin-bottom: 20px;
            border: 1.5px solid rgba(139, 92, 246, 0.2); box-shadow: 0 2px 8px rgba(109, 40, 217, 0.1);
            white-space: nowrap;
        }
        .form-group { margin-bottom: 14px; }
        .form-label { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 0.7rem; color: var(--text-primary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
        .form-label i { color: var(--primary); }
        .form-input {
            width: 100%; padding: 12px 14px; font-size: 0.87rem; font-family: var(--font); font-weight: 500;
            border: 2px solid #e5e7eb; border-radius: var(--radius-sm); background: #fafbfc; color: var(--text-primary);
            transition: all var(--transition); outline: none; box-shadow: var(--shadow-xs);
        }
        .form-input:focus { border-color: var(--primary); background: #fff; box-shadow: var(--shadow-glow), var(--shadow-sm); }
        .upload-area {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 16px 18px; border: 2.5px dashed #d1d5db; border-radius: var(--radius); background: #fafbfc;
            cursor: pointer; transition: all var(--transition); min-height: 50px; position: relative; overflow: hidden;
        }
        .upload-area:hover { border-color: var(--primary); background: #f5f3ff; }
        .upload-area.has-file { border-color: var(--success); background: #f0fdf7; border-style: solid; }
        .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .preview-container { display: none; margin-top: 8px; border-radius: var(--radius); overflow: hidden; border: 2px solid #e5e7eb; background: #fff; }
        .preview-container.show { display: block; }
        .preview-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
        .preview-filename { font-size: 0.75rem; font-weight: 700; word-break: break-all; }
        .preview-remove { background: #fef2f2; color: var(--danger); border: 1.5px solid #fecaca; padding: 5px 12px; border-radius: 18px; cursor: pointer; font-size: 0.7rem; font-weight: 700; }
        .preview-content { max-height: 280px; overflow: auto; display: flex; align-items: center; justify-content: center; background: #fafafa; padding: 6px; }
        .preview-content img { max-width: 100%; max-height: 260px; object-fit: contain; }
        .submit-btn {
            width: 100%; padding: 14px 22px; font-size: 0.92rem; font-weight: 700; font-family: var(--font); color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--accent-1), var(--accent-2));
            background-size: 200% 200%; animation: gradientFlow 4s ease-in-out infinite;
            border: none; border-radius: var(--radius); cursor: pointer; transition: all var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;
            box-shadow: 0 8px 24px rgba(109, 40, 217, 0.35);
        }
        .submit-btn:disabled { background: #d1d5db; cursor: not-allowed; box-shadow: none; }
        .toast {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-130px);
            background: #1a1535; color: #fff; padding: 11px 20px; border-radius: 28px; font-size: 0.8rem;
            font-weight: 600; z-index: 2000; box-shadow: 0 10px 28px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; align-items: center; gap: 7px; max-width: 90vw;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error-toast { background: #dc2626; }
        .toast.success-toast { background: #059669; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15,23,42,0.6); z-index: 1000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            opacity: 0; visibility: hidden; transition: all 0.35s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-dialog {
            background: #fff; border-radius: var(--radius-xl); padding: clamp(20px, 5vw, 36px);
            text-align: center; max-width: 440px; width: 100%;
            box-shadow: 0 32px 64px rgba(0,0,0,0.2);
            transform: translateY(30px) scale(0.9); transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-dialog { transform: translateY(0) scale(1); }
        .modal-close-btn {
            margin-top: 12px; padding: 12px 28px; font-size: 0.85rem; font-weight: 700; color: #fff;
            background: var(--primary); border: none; border-radius: 28px; cursor: pointer;
        }
        @media (max-width: 640px) {
            .form-container { border-radius: var(--radius-lg); padding: 16px 12px; }
            .form-input { padding: 10px 12px; font-size: 0.82rem; }
            .upload-area { padding: 13px 10px; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <div class="logo-wrapper">
                <img src="https://i.imgur.com/JkxRYd6.png" alt="Logo" width="500" height="500" loading="eager">
            </div>
            <h1>Upload Bukti Submit Jurnal & LoA</h1>
            <p style="color: var(--text-secondary); font-size: 0.82rem;">Form Akademik • Elegant & Secure</p>
        </div>
        <div style="text-align:center;">
            <span class="semester-badge" id="semesterBadge">
                <i class="fa-solid fa-calendar-star"></i>
                <span id="semesterLabel">Memuat...</span>
            </span>
        </div>

        <form id="uploadForm" novalidate>
            <!-- Nama Lengkap -->
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-user-pen"></i> Nama Lengkap</label>
                <input type="text" class="form-input" id="namaLengkap" name="namaLengkap" placeholder="Tulis nama lengkap Anda" maxlength="100">
            </div>

            <!-- NIM -->
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-fingerprint"></i> NIM <span style="color:var(--danger);">*</span></label>
                <input type="text" class="form-input" id="nim" name="nim" placeholder="Contoh: 202203001" maxlength="9" required inputmode="numeric" pattern="[0-9]{9}">
                <div style="color:var(--danger); font-size:0.7rem; display:none;" id="nimError"></div>
            </div>

            <!-- Judul Tesis -->
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-book-open"></i> Judul Tesis</label>
                <input type="text" class="form-input" id="judulTesis" name="judulTesis" placeholder="Masukkan judul tesis" maxlength="300">
            </div>

            <!-- Judul Artikel -->
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-file-signature"></i> Judul Artikel</label>
                <input type="text" class="form-input" id="judulArtikel" name="judulArtikel" placeholder="Masukkan judul artikel" maxlength="300">
            </div>

            <hr style="margin: 20px 0; border-top: 1.5px solid #e5e7eb;">

            <!-- Bukti Submit -->
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-file-arrow-up"></i> Bukti Submit Jurnal (PDF/Image)</label>
                <div class="upload-area" id="uploadAreaBukti">
                    <i class="fa-solid fa-cloud-arrow-up"></i> <span>Pilih File</span> <small>(PDF/JPG/PNG)</small>
                    <input type="file" id="fileBuktiSubmit" name="fileBuktiSubmit" accept=".pdf,.jpg,.jpeg,.png">
                </div>
                <div class="preview-container" id="previewBukti">
                    <div class="preview-header">
                        <span class="preview-filename" id="previewBuktiName"></span>
                        <button type="button" class="preview-remove" id="removeBukti"><i class="fa-solid fa-trash-can"></i> Hapus</button>
                    </div>
                    <div class="preview-content" id="previewBuktiContent"></div>
                </div>
            </div>

            <!-- Link Sinta -->
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-link"></i> Link Sinta / Akreditasi</label>
                <input type="url" class="form-input" id="linkSinta" name="linkSinta" placeholder="https://sinta.kemdikbud.go.id/...">
            </div>

            <!-- Dokumen LoA -->
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-file-arrow-up"></i> Dokumen LoA (PDF/Image)</label>
                <div class="upload-area" id="uploadAreaLoA">
                    <i class="fa-solid fa-cloud-arrow-up"></i> <span>Pilih File</span> <small>(PDF/JPG/PNG)</small>
                    <input type="file" id="fileLoA" name="fileLoA" accept=".pdf,.jpg,.jpeg,.png">
                </div>
                <div class="preview-container" id="previewLoA">
                    <div class="preview-header">
                        <span class="preview-filename" id="previewLoAName"></span>
                        <button type="button" class="preview-remove" id="removeLoA"><i class="fa-solid fa-trash-can"></i> Hapus</button>
                    </div>
                    <div class="preview-content" id="previewLoAContent"></div>
                </div>
            </div>

            <!-- Nama Jurnal -->
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-newspaper"></i> Nama Jurnal</label>
                <input type="text" class="form-input" id="namaJurnal" name="namaJurnal" placeholder="Masukkan nama jurnal" maxlength="200">
            </div>

            <!-- Link Jurnal LoA -->
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-link"></i> Link Jurnal / LoA</label>
                <input type="url" class="form-input" id="linkJurnalLoA" name="linkJurnalLoA" placeholder="https://...">
            </div>

            <!-- Submit -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fa-solid fa-paper-plane"></i> Kirim Dokumen
            </button>
        </form>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-dialog">
            <div style="font-size: 3rem; color: var(--success);">✅</div>
            <h2 style="margin: 0.5rem 0;">Upload Berhasil!</h2>
            <p>Data dan dokumen telah tersimpan.</p>
            <div style="text-align: left; background: #f9fafb; padding: 12px; border-radius: 8px; margin: 12px 0; font-size: 0.8rem;" id="modalDetail"></div>
            <button class="modal-close-btn" id="modalCloseBtn">Selesai</button>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            // KONFIGURASI
            // ============================================================
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbxkm49iFGirV3n9-HwEdbQBuKkTxO1lwyAFC7ZV4iniYtgNA0G-AvvOdKjpD8grz0w5/exec';
            const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

            // ============================================================
            // DOM ELEMENTS
            // ============================================================
            const form = document.getElementById('uploadForm');
            const nimInput = document.getElementById('nim');
            const nimError = document.getElementById('nimError');
            const toast = document.getElementById('toast');
            const successModal = document.getElementById('successModal');
            const modalDetail = document.getElementById('modalDetail');
            const semesterLabel = document.getElementById('semesterLabel');
            const submitBtn = document.getElementById('submitBtn');

            // File Bukti
            const fileBuktiSubmit = document.getElementById('fileBuktiSubmit');
            const uploadAreaBukti = document.getElementById('uploadAreaBukti');
            const previewBukti = document.getElementById('previewBukti');
            const previewBuktiName = document.getElementById('previewBuktiName');
            const previewBuktiContent = document.getElementById('previewBuktiContent');
            const removeBukti = document.getElementById('removeBukti');

            // File LoA
            const fileLoA = document.getElementById('fileLoA');
            const uploadAreaLoA = document.getElementById('uploadAreaLoA');
            const previewLoA = document.getElementById('previewLoA');
            const previewLoAName = document.getElementById('previewLoAName');
            const previewLoAContent = document.getElementById('previewLoAContent');
            const removeLoA = document.getElementById('removeLoA');

            // ============================================================
            // SEMESTER
            // ============================================================
            function getSemester() {
                const now = new Date();
                const month = now.getMonth();
                const year = now.getFullYear();
                if (month >= 6 && month <= 11) {
                    return {
                        label: `Semester Ganjil ${year}/${year+1}`,
                        folderName: `Semester Ganjil ${year}-${year+1}`,
                        code: `GANJIL_${year}_${year+1}`
                    };
                } else {
                    return {
                        label: `Semester Genap ${year-1}/${year}`,
                        folderName: `Semester Genap ${year-1}-${year}`,
                        code: `GENAP_${year-1}_${year}`
                    };
                }
            }
            const semester = getSemester();
            semesterLabel.textContent = semester.label;

            // ============================================================
            // TOAST
            // ============================================================
            let toastTimer;
            function showToast(msg, type = '') {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = 'toast ' + type + ' show';
                toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
            }

            // ============================================================
            // VALIDASI NIM (harus 9 digit & mengandung "03")
            // ============================================================
            nimInput.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '').slice(0, 9);
                validateNIM();
            });
            nimInput.addEventListener('blur', validateNIM);

            function validateNIM() {
                const val = nimInput.value.trim();
                nimError.style.display = 'none';
                if (val === '') {
                    nimError.textContent = 'NIM wajib diisi.';
                    nimError.style.display = 'block';
                    return false;
                }
                if (!/^\d{9}$/.test(val)) {
                    nimError.textContent = 'NIM harus tepat 9 digit angka.';
                    nimError.style.display = 'block';
                    return false;
                }
                if (!val.includes('03')) {
                    nimError.textContent = 'NIM wajib mengandung "03". Contoh: 202203001';
                    nimError.style.display = 'block';
                    return false;
                }
                return true;
            }

            // ============================================================
            // FILE HANDLING (simpel, tanpa abstraksi rumit)
            // ============================================================
            function handleFile(file, uploadArea, previewContainer, previewNameEl, previewContentEl) {
                if (!file) return;
                // Validasi ukuran
                if (file.size > MAX_FILE_SIZE) {
                    showToast('Ukuran file > 10MB! Maksimal 10MB.', 'error-toast');
                    return false;
                }
                const ext = file.name.split('.').pop().toLowerCase();
                if (!['pdf','jpg','jpeg','png'].includes(ext)) {
                    showToast('Format file tidak didukung! (PDF/JPG/PNG)', 'error-toast');
                    return false;
                }
                // Tampilkan preview
                uploadArea.classList.add('has-file');
                previewNameEl.textContent = file.name;
                previewContainer.classList.add('show');
                if (['jpg','jpeg','png'].includes(ext)) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        previewContentEl.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                    };
                    reader.readAsDataURL(file);
                } else {
                    previewContentEl.innerHTML = `<div style="text-align:center; padding:20px;"><i class="fa-solid fa-file-pdf" style="font-size:2rem; color:#ef4444;"></i><p>${file.name}</p></div>`;
                }
                return true;
            }

            function clearFile(fileInput, uploadArea, previewContainer, previewContentEl) {
                fileInput.value = '';
                uploadArea.classList.remove('has-file');
                previewContainer.classList.remove('show');
                previewContentEl.innerHTML = '';
            }

            // Event Bukti Submit
            fileBuktiSubmit.addEventListener('change', function() {
                if (this.files.length > 0) {
                    handleFile(this.files[0], uploadAreaBukti, previewBukti, previewBuktiName, previewBuktiContent);
                }
            });
            removeBukti.addEventListener('click', function(e) {
                e.stopPropagation();
                clearFile(fileBuktiSubmit, uploadAreaBukti, previewBukti, previewBuktiContent);
            });

            // Event LoA
            fileLoA.addEventListener('change', function() {
                if (this.files.length > 0) {
                    handleFile(this.files[0], uploadAreaLoA, previewLoA, previewLoAName, previewLoAContent);
                }
            });
            removeLoA.addEventListener('click', function(e) {
                e.stopPropagation();
                clearFile(fileLoA, uploadAreaLoA, previewLoA, previewLoAContent);
            });

            // Drag & drop (optional, tetap dipertahankan)
            function setupDragDrop(uploadArea, fileInput, previewContainer, previewNameEl, previewContentEl) {
                uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
                uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
                uploadArea.addEventListener('drop', e => {
                    e.preventDefault();
                    uploadArea.classList.remove('drag-over');
                    if (e.dataTransfer.files.length > 0) {
                        fileInput.files = e.dataTransfer.files;
                        handleFile(e.dataTransfer.files[0], uploadArea, previewContainer, previewNameEl, previewContentEl);
                    }
                });
            }
            setupDragDrop(uploadAreaBukti, fileBuktiSubmit, previewBukti, previewBuktiName, previewBuktiContent);
            setupDragDrop(uploadAreaLoA, fileLoA, previewLoA, previewLoAName, previewLoAContent);

            // ============================================================
            // FORM SUBMISSION
            // ============================================================
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Validasi NIM
                if (!validateNIM()) {
                    showToast('Periksa NIM Anda! Wajib 9 digit & mengandung "03".', 'error-toast');
                    nimInput.focus();
                    return;
                }

                // Cek minimal ada satu lampiran (file atau link)
                const hasBuktiFile = fileBuktiSubmit.files.length > 0;
                const hasLoAFile = fileLoA.files.length > 0;
                const linkSintaVal = document.getElementById('linkSinta').value.trim();
                const linkJurnalLoAVal = document.getElementById('linkJurnalLoA').value.trim();

                if (!hasBuktiFile && !hasLoAFile && !linkSintaVal && !linkJurnalLoAVal) {
                    const konfirmasi = confirm('Tidak ada file atau link yang diisi. Lanjutkan?');
                    if (!konfirmasi) return;
                }

                // Disable tombol
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner" style="display:inline-block; width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite;"></span> Mengirim...';

                try {
                    const formData = new FormData();
                    formData.append('namaLengkap', document.getElementById('namaLengkap').value.trim() || 'NN');
                    formData.append('nim', nimInput.value.trim());
                    formData.append('judulTesis', document.getElementById('judulTesis').value.trim());
                    formData.append('judulArtikel', document.getElementById('judulArtikel').value.trim());
                    formData.append('linkSinta', linkSintaVal);
                    formData.append('namaJurnal', document.getElementById('namaJurnal').value.trim());
                    formData.append('linkJurnalLoA', linkJurnalLoAVal);
                    formData.append('semester', semester.folderName);
                    formData.append('semesterCode', semester.code);
                    formData.append('timestamp', new Date().toISOString());

                    // Tambahkan file hanya jika ada
                    if (hasBuktiFile) {
                        formData.append('fileBuktiSubmit', fileBuktiSubmit.files[0]);
                        formData.append('fileBuktiSubmitName', fileBuktiSubmit.files[0].name);
                        console.log('✅ Menambahkan file Bukti:', fileBuktiSubmit.files[0].name);
                    } else {
                        console.warn('⚠️ Tidak ada file Bukti yang dipilih.');
                    }
                    if (hasLoAFile) {
                        formData.append('fileLoA', fileLoA.files[0]);
                        formData.append('fileLoAName', fileLoA.files[0].name);
                        console.log('✅ Menambahkan file LoA:', fileLoA.files[0].name);
                    } else {
                        console.warn('⚠️ Tidak ada file LoA yang dipilih.');
                    }

                    // Kirim
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error(`Server error (${response.status})`);
                    const result = await response.json();
                    console.log('📬 Respons:', result);

                    if (result.success) {
                        modalDetail.innerHTML = `
                            <strong>Nama:</strong> ${escapeHTML(result.data?.namaLengkap || '')}<br>
                            <strong>NIM:</strong> ${result.data?.nim || ''}<br>
                            <strong>Semester:</strong> ${semester.label}<br>
                            <strong>File Bukti:</strong> ${result.data?.fileLinks?.buktiSubmit ? '✅ Terupload' : '❌ Tidak ada'}<br>
                            <strong>File LoA:</strong> ${result.data?.fileLinks?.loa ? '✅ Terupload' : '❌ Tidak ada'}
                        `;
                        successModal.classList.add('active');
                        showToast('✅ Berhasil disimpan!', 'success-toast');

                        // Reset form
                        form.reset();
                        clearFile(fileBuktiSubmit, uploadAreaBukti, previewBukti, previewBuktiContent);
                        clearFile(fileLoA, uploadAreaLoA, previewLoA, previewLoAContent);
                    } else {
                        throw new Error(result.message || 'Gagal menyimpan data');
                    }
                } catch (error) {
                    console.error('❌ Error:', error);
                    showToast('❌ ' + error.message, 'error-toast');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Kirim Dokumen';
                }
            });

            // ============================================================
            // MODAL
            // ============================================================
            document.getElementById('modalCloseBtn').addEventListener('click', () => {
                successModal.classList.remove('active');
            });
            successModal.addEventListener('click', function(e) {
                if (e.target === successModal) successModal.classList.remove('active');
            });

            // Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && successModal.classList.contains('active')) {
                    successModal.classList.remove('active');
                }
            });

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            console.log('✨ Form siap. Semester:', semester.label);
        })();
    </script>
</body>
</html>
