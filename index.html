<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Form Upload Bukti Submit Jurnal & LoA - Secure & Elegant">
    <meta name="theme-color" content="#6d28d9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>✨ Upload Bukti Jurnal & LoA</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --hue: 260;
            --primary: hsl(var(--hue), 80%, 55%);
            --primary-light: hsl(var(--hue), 90%, 65%);
            --primary-dark: hsl(var(--hue), 80%, 35%);
            --accent-1: hsl(calc(var(--hue) + 30), 75%, 55%);
            --accent-2: hsl(calc(var(--hue) + 60), 70%, 60%);
            
            --bg-start: hsl(var(--hue), 30%, 96%);
            --bg-mid: hsl(calc(var(--hue) + 20), 25%, 94%);
            --bg-end: hsl(calc(var(--hue) - 20), 20%, 92%);
            
            --card-bg: rgba(255, 255, 255, 0.88);
            --card-border: rgba(255, 255, 255, 0.7);
            --text-primary: #1a1535;
            --text-secondary: #5b5480;
            --text-muted: #a8a3c0;
            
            --success: #10b981;
            --success-light: #ecfdf5;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 16px rgba(0, 0, 0, 0.06), 0 4px 8px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 16px 32px rgba(0, 0, 0, 0.08), 0 8px 16px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 24px 48px rgba(0, 0, 0, 0.1), 0 12px 24px rgba(0, 0, 0, 0.05);
            --shadow-glow: 0 0 0 4px rgba(109, 40, 217, 0.12);
            --shadow-glow-lg: 0 0 40px rgba(109, 40, 217, 0.15);
            
            --radius-xs: 8px;
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-2xl: 32px;
            
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            
            --font: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --glass-blur: blur(22px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 20%, var(--bg-end) 40%, var(--bg-mid) 60%, var(--bg-start) 80%, var(--bg-end) 100%);
            background-attachment: fixed;
            background-size: 400% 400%;
            animation: bgShift 20s ease-in-out infinite;
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text-primary);
            line-height: 1.6;
            padding: 10px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes bgShift {
            0%, 100% { background-position: 0% 50%; }
            25% { background-position: 50% 0%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 100%; }
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 12s ease-in-out infinite;
        }
        .bg-orb.orb-1 {
            width: 280px; height: 280px;
            background: hsl(calc(var(--hue) + 20), 70%, 65%);
            top: -50px; right: -70px;
            animation-delay: 0s; animation-duration: 14s;
        }
        .bg-orb.orb-2 {
            width: 200px; height: 200px;
            background: hsl(calc(var(--hue) + 50), 65%, 60%);
            bottom: 15%; left: -60px;
            animation-delay: -4s; animation-duration: 16s;
        }
        .bg-orb.orb-3 {
            width: 170px; height: 170px;
            background: hsl(calc(var(--hue) - 30), 60%, 55%);
            top: 45%; right: -40px;
            animation-delay: -8s; animation-duration: 18s;
        }
        .bg-orb.orb-4 {
            width: 140px; height: 140px;
            background: hsl(var(--hue), 55%, 70%);
            bottom: 30%; right: 25%;
            animation-delay: -2s; animation-duration: 13s;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(25px, -35px) scale(1.1); }
            50% { transform: translate(-20px, 25px) scale(0.9); }
            75% { transform: translate(-30px, -20px) scale(1.05); }
        }

        .sparkle-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .sparkle {
            position: absolute;
            width: 3px; height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(139, 92, 246, 0.5);
            animation: sparkleFloat 6s ease-in-out infinite;
            opacity: 0;
        }
        @keyframes sparkleFloat {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            20% { opacity: 0.9; }
            50% { opacity: 0.5; transform: translateY(-50px) scale(1.4); }
            100% { opacity: 0; transform: translateY(-100px) scale(0); }
        }

        .form-container {
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl), var(--shadow-glow-lg);
            padding: clamp(20px, 4vw, 36px);
            margin: 10px auto 30px;
            position: relative;
            z-index: 1;
            border: 1.5px solid var(--card-border);
            transition: all var(--transition);
            animation: cardEntry 0.6s cubic-bezier(0.25, 0.8, 0.25, 1.2) forwards;
        }
        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .form-container::before {
            content: '';
            position: absolute;
            top: 0; left: 20px; right: 20px;
            height: 4px;
            border-radius: 0 0 20px 20px;
            background: linear-gradient(90deg, var(--primary), var(--accent-1), var(--accent-2), var(--primary));
            background-size: 300% 100%;
            animation: gradientFlow 4s ease-in-out infinite;
            box-shadow: 0 4px 20px rgba(109, 40, 217, 0.3);
        }
        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .form-header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 8px;
        }
        .form-header .logo-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 90px; height: 90px;
            margin-bottom: 12px;
            position: relative;
            animation: logoFloat 3s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .form-header .logo-wrapper img {
            width: 100%; height: 100%;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(109, 40, 217, 0.3);
            background: white;
            padding: 8px;
        }
        .form-header .logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 30px;
            border: 2.5px dashed rgba(139, 92, 246, 0.35);
            animation: spinSlow 10s linear infinite;
        }
        @keyframes spinSlow { to { transform: rotate(360deg); } }
        .form-header h1 {
            font-size: clamp(1.2rem, 2.5vw, 1.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 2px;
            letter-spacing: -0.03em;
        }
        .form-header p {
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .semester-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, hsl(var(--hue), 30%, 94%), hsl(var(--hue), 25%, 90%));
            color: var(--primary-dark);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 7px 16px;
            border-radius: 25px;
            margin-bottom: 20px;
            letter-spacing: 0.01em;
            white-space: nowrap;
            border: 1.5px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 2px 8px rgba(109, 40, 217, 0.1);
            animation: fadeInUp 0.5s ease forwards;
            animation-delay: 0.1s;
            opacity: 0;
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(10px); }
        }
        .semester-badge i { color: var(--primary); font-size: 0.7rem; }

        .form-group {
            margin-bottom: 14px;
            position: relative;
            animation: fadeInUp 0.45s ease forwards;
            opacity: 0;
        }
        .form-group:nth-child(1) { animation-delay: 0.10s; }
        .form-group:nth-child(2) { animation-delay: 0.14s; }
        .form-group:nth-child(3) { animation-delay: 0.18s; }
        .form-group:nth-child(4) { animation-delay: 0.22s; }
        .form-group:nth-child(5) { animation-delay: 0.26s; }
        .form-group:nth-child(6) { animation-delay: 0.30s; }
        .form-group:nth-child(7) { animation-delay: 0.34s; }
        .form-group:nth-child(8) { animation-delay: 0.38s; }
        .form-group:nth-child(9) { animation-delay: 0.42s; }

        .form-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--text-primary);
            margin-bottom: 5px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .form-label i { font-size: 0.8rem; color: var(--primary); width: 16px; text-align: center; }
        .form-label .required-star { color: var(--danger); font-weight: 800; font-size: 0.85rem; }
        .form-label .optional-tag {
            font-weight: 600;
            font-size: 0.6rem;
            color: var(--text-muted);
            background: #f3f4f6;
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 0.03em;
            text-transform: none;
            margin-left: auto;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            font-size: 0.87rem;
            font-family: var(--font);
            font-weight: 500;
            border: 2px solid #e5e7eb;
            border-radius: var(--radius-sm);
            background: #fafbfc;
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none;
            letter-spacing: -0.01em;
            box-shadow: var(--shadow-xs);
        }
        .form-input:hover {
            border-color: #d1d5db;
            background: #fff;
            box-shadow: var(--shadow-sm);
        }
        .form-input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: var(--shadow-glow), var(--shadow-sm);
            transform: translateY(-1px);
        }
        .form-input.error {
            border-color: var(--danger);
            background: #fff5f5;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.08);
            animation: shake 0.5s ease;
        }
        .form-input.success {
            border-color: var(--success);
            background: #f0fdf7;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        .error-message {
            display: none;
            font-size: 0.7rem;
            color: var(--danger);
            margin-top: 4px;
            font-weight: 600;
            align-items: center;
            gap: 4px;
            animation: fadeInDown 0.3s ease;
        }
        .error-message.show { display: flex; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-wrapper { position: relative; }
        .upload-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 18px;
            border: 2.5px dashed #d1d5db;
            border-radius: var(--radius);
            background: #fafbfc;
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            min-height: 50px;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-xs);
        }
        .upload-area:hover {
            border-color: var(--primary);
            background: #f5f3ff;
            box-shadow: var(--shadow-md), 0 0 0 6px rgba(109, 40, 217, 0.04);
            transform: translateY(-2px);
        }
        .upload-area.drag-over {
            border-color: var(--primary);
            background: #ede9fe;
            box-shadow: 0 0 0 12px rgba(109, 40, 217, 0.08);
            transform: scale(1.02);
            border-style: solid;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 8px rgba(109, 40, 217, 0.06); }
            50% { box-shadow: 0 0 0 16px rgba(109, 40, 217, 0.02); }
        }
        .upload-area.has-file {
            border-color: var(--success);
            border-style: solid;
            background: linear-gradient(135deg, #f0fdf7, #ecfdf5);
            box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.06);
        }
        .upload-area .upload-icon { font-size: 1.2rem; color: #9ca3af; transition: all var(--transition); flex-shrink: 0; }
        .upload-area.has-file .upload-icon { color: var(--success); animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .upload-area .upload-text { font-size: 0.82rem; color: #6b7280; font-weight: 600; transition: all var(--transition); }
        .upload-area.has-file .upload-text { color: #059669; font-weight: 700; }
        .upload-area .upload-hint {
            font-size: 0.68rem;
            color: #9ca3af;
            font-weight: 500;
            transition: all var(--transition);
            background: #f3f4f6;
            padding: 2px 8px;
            border-radius: 8px;
        }
        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%; height: 100%;
            z-index: 2;
        }

        .preview-container {
            display: none;
            margin-top: 8px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px solid #e5e7eb;
            background: #fff;
            position: relative;
            box-shadow: var(--shadow-md);
            animation: slideDown 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            max-height: 400px;
        }
        @keyframes slideDown {
            from { opacity: 0; max-height: 0; transform: translateY(-8px); }
            to { opacity: 1; max-height: 400px; transform: translateY(0); }
        }
        .preview-container.show { display: block; }
        .preview-container .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            gap: 8px;
            flex-wrap: wrap;
        }
        .preview-container .preview-filename {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-primary);
            word-break: break-all;
            flex: 1;
            min-width: 0;
            letter-spacing: -0.01em;
        }
        .preview-container .preview-remove {
            background: #fef2f2;
            color: var(--danger);
            border: 1.5px solid #fecaca;
            padding: 5px 12px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 700;
            transition: all var(--transition-fast);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            font-family: var(--font);
        }
        .preview-container .preview-remove:hover {
            background: #dc2626;
            color: #fff;
            border-color: #dc2626;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
        .preview-container .preview-remove:active { transform: scale(0.94); }
        .preview-content {
            width: 100%;
            max-height: 300px;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            padding: 6px;
            -webkit-overflow-scrolling: touch;
        }
        .preview-content img {
            max-width: 100%;
            max-height: 280px;
            object-fit: contain;
            border-radius: 6px;
            display: block;
        }
        .preview-content iframe {
            width: 100%;
            height: 280px;
            border: none;
            border-radius: 6px;
        }
        .preview-content .pdf-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px;
            color: #6b7280;
            text-align: center;
            font-weight: 500;
        }
        .preview-content .pdf-fallback i { font-size: 2.5rem; color: #ef4444; }

        .section-divider {
            border: none;
            border-top: 1.5px solid #e5e7eb;
            margin: 20px 0;
            position: relative;
        }
        .section-divider span {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            padding: 3px 14px;
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border-radius: 18px;
            border: 1px solid #e5e7eb;
        }

        .submit-btn {
            width: 100%;
            padding: 14px 22px;
            font-size: 0.92rem;
            font-weight: 700;
            font-family: var(--font);
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--accent-1), var(--accent-2));
            background-size: 200% 200%;
            animation: gradientFlow 4s ease-in-out infinite;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            box-shadow: 0 8px 24px rgba(109, 40, 217, 0.35);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease forwards, gradientFlow 4s ease-in-out infinite;
            animation-delay: 0.46s;
            opacity: 0;
        }
        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity var(--transition);
        }
        .submit-btn:hover {
            box-shadow: 0 12px 32px rgba(109, 40, 217, 0.5);
            transform: translateY(-3px);
        }
        .submit-btn:hover::after { opacity: 1; }
        .submit-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 14px rgba(109, 40, 217, 0.3);
            transition: all 0.1s ease;
        }
        .submit-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            pointer-events: none;
            color: #9ca3af;
            animation: none;
        }
        .submit-btn .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .submit-btn.loading .spinner { display: inline-block; }
        .submit-btn.loading .btn-text { opacity: 0.8; }
        .submit-btn.loading .btn-icon { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.35s ease;
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-dialog {
            background: #fff;
            border-radius: var(--radius-xl);
            padding: clamp(20px, 5vw, 36px);
            text-align: center;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.2);
            transform: translateY(30px) scale(0.9);
            transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-dialog { transform: translateY(0) scale(1); }
        .modal-icon {
            width: 75px; height: 75px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ecfdf5, #d1fae5);
            color: var(--success);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin-bottom: 14px;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.25);
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            70% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .modal-dialog h2 {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-primary);
            margin: 0 0 4px;
            letter-spacing: -0.03em;
        }
        .modal-dialog p {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin: 0 0 6px;
            line-height: 1.5;
            font-weight: 500;
        }
        .modal-dialog .modal-detail {
            background: #f9fafb;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: left;
            margin: 12px 0;
            word-break: break-all;
            line-height: 1.7;
            border: 1px solid #e5e7eb;
            font-weight: 500;
        }
        .modal-dialog .modal-detail strong { color: var(--text-primary); font-weight: 700; }
        .modal-close-btn {
            margin-top: 12px;
            padding: 12px 28px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: var(--font);
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--accent-1));
            border: none;
            border-radius: 28px;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: -0.01em;
            box-shadow: 0 6px 18px rgba(109, 40, 217, 0.3);
        }
        .modal-close-btn:hover {
            box-shadow: 0 10px 26px rgba(109, 40, 217, 0.45);
            transform: translateY(-2px);
        }
        .modal-close-btn:active { transform: scale(0.95); }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.6);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            -webkit-backdrop-filter: blur(2px);
            backdrop-filter: blur(2px);
        }
        .loading-overlay.active { opacity: 1; visibility: visible; }
        .loading-spinner-large {
            width: 48px; height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 4px 16px rgba(109, 40, 217, 0.2);
        }

        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-130px);
            background: #1a1535;
            color: #fff;
            padding: 11px 20px;
            border-radius: 28px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 2000;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 7px;
            max-width: 90vw;
            white-space: nowrap;
            font-family: var(--font);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error-toast { background: #dc2626; box-shadow: 0 10px 28px rgba(220, 38, 38, 0.35); }
        .toast.success-toast { background: #059669; box-shadow: 0 10px 28px rgba(5, 150, 105, 0.35); }

        /* Responsive */
        @media (max-width: 640px) {
            body { padding: 4px; }
            .bg-orb, .sparkle-container { display: none; }
            .form-container { border-radius: var(--radius-lg); padding: 16px 12px; margin: 4px auto 16px; }
            .form-container::before { left: 10px; right: 10px; height: 3px; }
            .form-header .logo-wrapper { width: 70px; height: 70px; }
            .form-header .logo-wrapper img { border-radius: 18px; padding: 5px; }
            .form-header .logo-wrapper::after { inset: -7px; border-radius: 22px; }
            .form-header h1 { font-size: 1.1rem; }
            .form-input { padding: 10px 12px; font-size: 0.82rem; border-radius: var(--radius-xs); }
            .upload-area { padding: 13px 10px; gap: 6px; border-radius: var(--radius-xs); }
            .upload-area .upload-text { font-size: 0.75rem; }
            .submit-btn { padding: 13px 18px; font-size: 0.85rem; border-radius: var(--radius-sm); }
            .preview-content iframe { height: 200px; }
            .preview-content img { max-height: 200px; }
            .modal-dialog { padding: 18px 14px; border-radius: var(--radius-lg); }
        }
        @media (max-width: 380px) {
            .form-container { padding: 12px 8px; border-radius: var(--radius); }
            .form-header .logo-wrapper { width: 60px; height: 60px; }
            .form-header .logo-wrapper img { border-radius: 14px; padding: 4px; }
            .form-header h1 { font-size: 1rem; }
            .form-input { padding: 9px 10px; font-size: 0.78rem; }
            .upload-area { padding: 10px 8px; }
            .upload-area .upload-text { font-size: 0.7rem; }
            .submit-btn { font-size: 0.78rem; padding: 11px 14px; }
            .preview-content iframe { height: 170px; }
            .preview-content img { max-height: 170px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
            .bg-orb, .sparkle { display: none; }
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --card-bg: rgba(30, 25, 60, 0.85);
                --card-border: rgba(255, 255, 255, 0.08);
                --text-primary: #e8e5f5;
                --text-secondary: #b8b3d0;
                --text-muted: #8078a0;
                --bg-start: #1a1535;
                --bg-mid: #1e1a40;
                --bg-end: #15102e;
            }
            body { background: linear-gradient(160deg, var(--bg-start), var(--bg-mid), var(--bg-end), var(--bg-mid), var(--bg-start)); }
            .form-input { background: #252040; border-color: #3a3560; color: #e8e5f5; }
            .form-input:focus { background: #2d2850; border-color: var(--primary-light); }
            .form-input.error { background: #3b1a1a; }
            .form-input.success { background: #1a3b2e; }
            .upload-area { background: #252040; border-color: #3a3560; }
            .upload-area:hover { background: #2d2850; }
            .upload-area.drag-over { background: #352e55; }
            .upload-area.has-file { background: #1a332a; }
            .preview-container { background: #252040; border-color: #3a3560; }
            .preview-container .preview-header { background: #1e1935; border-bottom-color: #3a3560; }
            .preview-content { background: #1a1530; }
            .modal-dialog { background: #252040; color: #e8e5f5; }
            .modal-dialog .modal-detail { background: #1e1935; border-color: #3a3560; }
            .section-divider { border-top-color: #3a3560; }
            .section-divider span { background: #252040; border-color: #3a3560; color: #8078a0; }
            .toast { background: #e8e5f5; color: #1a1535; }
        }
    </style>
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="bg-orb orb-4"></div>
    <div class="sparkle-container" id="sparkleContainer"></div>

    <div class="toast" id="toast"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner-large"></div>
    </div>

    <div class="form-container" id="formContainer">
        <div class="form-header">
            <div class="logo-wrapper">
                <img src="https://i.imgur.com/JkxRYd6.png" alt="Logo Upload" width="500" height="500" loading="eager" crossorigin="anonymous">
            </div>
            <h1>Upload Bukti Submit Jurnal & LoA</h1>
            <p>Form Akademik • Elegant & Secure</p>
        </div>

        <div style="text-align:center;">
            <span class="semester-badge" id="semesterBadge">
                <i class="fa-solid fa-calendar-star"></i>
                <span id="semesterLabel">Memuat...</span>
            </span>
        </div>

        <form id="uploadForm" novalidate autocomplete="off">
            <div class="form-group">
                <label class="form-label" for="namaLengkap">
                    <i class="fa-solid fa-user-pen"></i> Nama Lengkap
                    <span class="optional-tag">Opsional</span>
                </label>
                <input type="text" class="form-input" id="namaLengkap" name="namaLengkap"
                placeholder="Tulis nama lengkap Anda" maxlength="100" autocomplete="name">
            </div>

            <div class="form-group">
                <label class="form-label" for="nim">
                    <i class="fa-solid fa-fingerprint"></i> NIM
                    <span class="required-star">*</span>
                </label>
                <input type="text" class="form-input" id="nim" name="nim"
                placeholder="Contoh: 202403001" maxlength="9" required
                inputmode="numeric" pattern="[0-9]{9}" autocomplete="off">
                <div class="error-message" id="nimError">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="nimErrorText"></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="judulTesis">
                    <i class="fa-solid fa-book-open"></i> Judul Tesis
                    <span class="optional-tag">Opsional</span>
                </label>
                <input type="text" class="form-input" id="judulTesis" name="judulTesis"
                placeholder="Masukkan judul tesis" maxlength="300" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="judulArtikel">
                    <i class="fa-solid fa-file-signature"></i> Judul Artikel
                    <span class="optional-tag">Opsional</span>
                </label>
                <input type="text" class="form-input" id="judulArtikel" name="judulArtikel"
                placeholder="Masukkan judul artikel" maxlength="300" autocomplete="off">
            </div>

            <hr class="section-divider"><span>📎 Dokumen & Link</span></hr>

            <div class="form-group">
                <label class="form-label" for="fileBuktiSubmit">
                    <i class="fa-solid fa-file-arrow-up"></i> Bukti Submit Jurnal
                    <span class="optional-tag">Opsional</span>
                </label>
                <div class="upload-wrapper">
                    <div class="upload-area" id="uploadAreaBukti">
                        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                        <span class="upload-text">Pilih File</span>
                        <span class="upload-hint">PDF/JPG/PNG</span>
                        <input type="file" id="fileBuktiSubmit" name="fileBuktiSubmit"
                        accept=".pdf,.jpg,.jpeg,.png" aria-label="Upload Bukti Submit Jurnal">
                    </div>
                </div>
                <div class="preview-container" id="previewBukti">
                    <div class="preview-header">
                        <span class="preview-filename" id="previewBuktiName"></span>
                        <button type="button" class="preview-remove" id="removeBukti">
                            <i class="fa-solid fa-trash-can"></i> Hapus
                        </button>
                    </div>
                    <div class="preview-content" id="previewBuktiContent"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="linkSinta">
                    <i class="fa-solid fa-link"></i> Link Sinta / Akreditasi
                    <span class="optional-tag">Opsional</span>
                </label>
                <input type="url" class="form-input" id="linkSinta" name="linkSinta"
                placeholder="https://sinta.kemdikbud.go.id/..." autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="fileLoA">
                    <i class="fa-solid fa-file-arrow-up"></i> Dokumen LoA
                    <span class="optional-tag">Opsional</span>
                </label>
                <div class="upload-wrapper">
                    <div class="upload-area" id="uploadAreaLoA">
                        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                        <span class="upload-text">Pilih File</span>
                        <span class="upload-hint">PDF/JPG/PNG</span>
                        <input type="file" id="fileLoA" name="fileLoA"
                        accept=".pdf,.jpg,.jpeg,.png" aria-label="Upload Dokumen LoA">
                    </div>
                </div>
                <div class="preview-container" id="previewLoA">
                    <div class="preview-header">
                        <span class="preview-filename" id="previewLoAName"></span>
                        <button type="button" class="preview-remove" id="removeLoA">
                            <i class="fa-solid fa-trash-can"></i> Hapus
                        </button>
                    </div>
                    <div class="preview-content" id="previewLoAContent"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="namaJurnal">
                    <i class="fa-solid fa-newspaper"></i> Nama Jurnal
                    <span class="optional-tag">Opsional</span>
                </label>
                <input type="text" class="form-input" id="namaJurnal" name="namaJurnal"
                placeholder="Masukkan nama jurnal" maxlength="200" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="linkJurnalLoA">
                    <i class="fa-solid fa-link"></i> Link Jurnal LoA
                    <span class="optional-tag">Opsional</span>
                </label>
                <input type="url" class="form-input" id="linkJurnalLoA" name="linkJurnalLoA"
                placeholder="https://..." autocomplete="off">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="spinner"></span>
                <i class="fa-solid fa-paper-plane btn-icon"></i>
                <span class="btn-text">Kirim Dokumen</span>
            </button>
        </form>
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-dialog">
            <div class="modal-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2>🎉 Upload Berhasil!</h2>
            <p>Dokumen Anda telah tersimpan dengan aman.</p>
            <div class="modal-detail" id="modalDetail"></div>
            <button class="modal-close-btn" id="modalCloseBtn">
                <i class="fa-solid fa-check"></i> Selesai
            </button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // KONFIGURASI
            // ============================================================
            const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxUkC_p_xWisLm4zXFFzezR2QQz8U9Lepkg22dn7OMthSsT_SA7jtB6vvQsiWMhEGu2/exec';
            const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

            // ============================================================
            // DOM ELEMENTS
            // ============================================================
            const form = document.getElementById('uploadForm');
            const nimInput = document.getElementById('nim');
            const nimError = document.getElementById('nimError');
            const nimErrorText = document.getElementById('nimErrorText');
            const submitBtn = document.getElementById('submitBtn');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const successModal = document.getElementById('successModal');
            const modalDetail = document.getElementById('modalDetail');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            const toast = document.getElementById('toast');
            const semesterLabel = document.getElementById('semesterLabel');
            const sparkleContainer = document.getElementById('sparkleContainer');

            const fileBuktiSubmit = document.getElementById('fileBuktiSubmit');
            const uploadAreaBukti = document.getElementById('uploadAreaBukti');
            const previewBukti = document.getElementById('previewBukti');
            const previewBuktiName = document.getElementById('previewBuktiName');
            const previewBuktiContent = document.getElementById('previewBuktiContent');
            const removeBukti = document.getElementById('removeBukti');

            const fileLoA = document.getElementById('fileLoA');
            const uploadAreaLoA = document.getElementById('uploadAreaLoA');
            const previewLoA = document.getElementById('previewLoA');
            const previewLoAName = document.getElementById('previewLoAName');
            const previewLoAContent = document.getElementById('previewLoAContent');
            const removeLoA = document.getElementById('removeLoA');

            // ============================================================
            // SPARKLE PARTICLES
            // ============================================================
            function createSparkles() {
                const count = 20;
                for (let i = 0; i < count; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.classList.add('sparkle');
                    sparkle.style.left = Math.random() * 100 + '%';
                    sparkle.style.top = Math.random() * 100 + '%';
                    sparkle.style.animationDelay = Math.random() * 6 + 's';
                    sparkle.style.animationDuration = (4 + Math.random() * 8) + 's';
                    sparkle.style.width = (2 + Math.random() * 4) + 'px';
                    sparkle.style.height = sparkle.style.width;
                    sparkleContainer.appendChild(sparkle);
                }
            }
            createSparkles();

            // ============================================================
            // RIPPLE EFFECT
            // ============================================================
            function addRipple(e, element) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                element.appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            }
            submitBtn.addEventListener('click', function(e) {
                if (!submitBtn.disabled) addRipple(e, submitBtn);
            });

            // ============================================================
            // SEMESTER
            // ============================================================
            function getCurrentSemester() {
                const now = new Date();
                const month = now.getMonth();
                const year = now.getFullYear();
                if (month >= 6 && month <= 11) {
                    return {
                        label: `Semester Ganjil ${year}/${year + 1}`,
                        folderName: `Semester Ganjil ${year}-${year + 1}`,
                        code: `GANJIL_${year}_${year + 1}`
                    };
                } else {
                    return {
                        label: `Semester Genap ${year - 1}/${year}`,
                        folderName: `Semester Genap ${year - 1}-${year}`,
                        code: `GENAP_${year - 1}_${year}`
                    };
                }
            }
            const currentSemester = getCurrentSemester();
            semesterLabel.textContent = currentSemester.label;

            // ============================================================
            // TOAST
            // ============================================================
            let toastTimeout;
            function showToast(message, type = '') {
                clearTimeout(toastTimeout);
                toast.textContent = message;
                toast.className = 'toast ' + type + ' show';
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3500);
            }

            // ============================================================
            // NIM VALIDATION
            // ============================================================
            nimInput.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '').slice(0, 9);
                validateNIM();
            });
            nimInput.addEventListener('blur', validateNIM);

            function validateNIM() {
                const value = nimInput.value.trim();
                nimInput.classList.remove('error', 'success');
                nimError.classList.remove('show');
                if (value === '') {
                    nimInput.classList.add('error');
                    nimErrorText.textContent = 'NIM wajib diisi.';
                    nimError.classList.add('show');
                    return false;
                }
                if (!/^\d{9}$/.test(value)) {
                    nimInput.classList.add('error');
                    nimErrorText.textContent = 'NIM harus tepat 9 angka.';
                    nimError.classList.add('show');
                    return false;
                }
                if (!value.includes('03')) {
                    nimInput.classList.add('error');
                    nimErrorText.textContent = 'NIM harus mengandung "03". Contoh: 202403001';
                    nimError.classList.add('show');
                    return false;
                }
                nimInput.classList.add('success');
                nimError.classList.remove('show');
                return true;
            }

            // ============================================================
            // FILE HANDLING
            // ============================================================
            function handleFileSelect(fileInput, uploadArea, previewContainer, previewNameEl, previewContentEl) {
                const file = fileInput.files[0];
                if (!file) return;
                if (file.size > MAX_FILE_SIZE) {
                    showToast('⚠️ Ukuran file terlalu besar! Maks 10MB.', 'error-toast');
                    clearFileUpload(fileInput, uploadArea, previewContainer, previewContentEl);
                    return;
                }
                const ext = file.name.split('.').pop().toLowerCase();
                if (!['pdf', 'jpg', 'jpeg', 'png'].includes(ext)) {
                    showToast('⚠️ Format tidak didukung! Gunakan .pdf, .jpg, .png', 'error-toast');
                    clearFileUpload(fileInput, uploadArea, previewContainer, previewContentEl);
                    return;
                }
                uploadArea.classList.add('has-file');
                const uploadText = uploadArea.querySelector('.upload-text');
                const uploadHint = uploadArea.querySelector('.upload-hint');
                if (uploadText) uploadText.textContent = '✅ File dipilih';
                if (uploadHint) uploadHint.textContent = `(${formatFileSize(file.size)})`;
                previewNameEl.textContent = file.name;
                previewContainer.classList.add('show');
                renderPreview(file, previewContentEl, ext);
            }

            function clearFileUpload(fileInput, uploadArea, previewContainer, previewContentEl) {
                fileInput.value = '';
                uploadArea.classList.remove('has-file');
                const uploadText = uploadArea.querySelector('.upload-text');
                const uploadHint = uploadArea.querySelector('.upload-hint');
                if (uploadText) uploadText.textContent = 'Pilih File';
                if (uploadHint) uploadHint.textContent = 'PDF/JPG/PNG';
                previewContainer.classList.remove('show');
                if (previewContentEl._cleanupBlob) {
                    previewContentEl._cleanupBlob();
                    previewContentEl._cleanupBlob = null;
                }
                previewContentEl.innerHTML = '';
            }

            function renderPreview(file, container, ext) {
                if (container._cleanupBlob) {
                    container._cleanupBlob();
                    container._cleanupBlob = null;
                }
                container.innerHTML = '';
                if (['jpg', 'jpeg', 'png'].includes(ext)) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.alt = 'Preview';
                        img.loading = 'lazy';
                        img.onerror = () => {
                            container.innerHTML = '<div class="pdf-fallback"><i class="fa-solid fa-image"></i><span>Gagal memuat pratinjau</span></div>';
                        };
                        container.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                } else if (ext === 'pdf') {
                    const blobUrl = URL.createObjectURL(file);
                    const iframe = document.createElement('iframe');
                    iframe.src = blobUrl;
                    iframe.title = 'Preview PDF';
                    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
                    container.appendChild(iframe);
                    container._cleanupBlob = () => URL.revokeObjectURL(blobUrl);
                }
            }

            function formatFileSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            // Bind events
            fileBuktiSubmit.addEventListener('change', function() {
                handleFileSelect(this, uploadAreaBukti, previewBukti, previewBuktiName, previewBuktiContent);
            });
            removeBukti.addEventListener('click', function(e) {
                e.stopPropagation();
                clearFileUpload(fileBuktiSubmit, uploadAreaBukti, previewBukti, previewBuktiContent);
            });
            uploadAreaBukti.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); this.classList.add('drag-over'); });
            uploadAreaBukti.addEventListener('dragleave', function(e) { e.preventDefault(); e.stopPropagation(); this.classList.remove('drag-over'); });
            uploadAreaBukti.addEventListener('drop', function(e) {
                e.preventDefault(); e.stopPropagation(); this.classList.remove('drag-over');
                if (e.dataTransfer.files.length > 0) {
                    fileBuktiSubmit.files = e.dataTransfer.files;
                    handleFileSelect(fileBuktiSubmit, uploadAreaBukti, previewBukti, previewBuktiName, previewBuktiContent);
                }
            });

            fileLoA.addEventListener('change', function() {
                handleFileSelect(this, uploadAreaLoA, previewLoA, previewLoAName, previewLoAContent);
            });
            removeLoA.addEventListener('click', function(e) {
                e.stopPropagation();
                clearFileUpload(fileLoA, uploadAreaLoA, previewLoA, previewLoAContent);
            });
            uploadAreaLoA.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); this.classList.add('drag-over'); });
            uploadAreaLoA.addEventListener('dragleave', function(e) { e.preventDefault(); e.stopPropagation(); this.classList.remove('drag-over'); });
            uploadAreaLoA.addEventListener('drop', function(e) {
                e.preventDefault(); e.stopPropagation(); this.classList.remove('drag-over');
                if (e.dataTransfer.files.length > 0) {
                    fileLoA.files = e.dataTransfer.files;
                    handleFileSelect(fileLoA, uploadAreaLoA, previewLoA, previewLoAName, previewLoAContent);
                }
            });

            // ============================================================
            // FORM SUBMISSION
            // ============================================================
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                if (!validateNIM()) {
                    nimInput.focus();
                    showToast('⚠️ Periksa NIM Anda. Wajib 9 angka dan mengandung "03".', 'error-toast');
                    nimInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }

                const hasBuktiFile = fileBuktiSubmit.files.length > 0;
                const hasLoAFile = fileLoA.files.length > 0;
                const linkSintaVal = document.getElementById('linkSinta').value.trim();
                const linkJurnalLoAVal = document.getElementById('linkJurnalLoA').value.trim();

                if (!hasBuktiFile && !hasLoAFile && !linkSintaVal && !linkJurnalLoAVal) {
                    const confirmed = confirm('⚠️ Belum ada file/link yang diisi.\n\nLanjutkan submit tanpa lampiran?');
                    if (!confirmed) return;
                }

                submitBtn.disabled = true;
                submitBtn.classList.add('loading');
                loadingOverlay.classList.add('active');

                try {
                    const formData = new FormData();
                    const namaLengkap = document.getElementById('namaLengkap').value.trim() || 'NN';
                    const nim = nimInput.value.trim();

                    formData.append('namaLengkap', namaLengkap);
                    formData.append('nim', nim);
                    formData.append('judulTesis', document.getElementById('judulTesis').value.trim());
                    formData.append('judulArtikel', document.getElementById('judulArtikel').value.trim());
                    formData.append('linkSinta', linkSintaVal);
                    formData.append('namaJurnal', document.getElementById('namaJurnal').value.trim());
                    formData.append('linkJurnalLoA', linkJurnalLoAVal);
                    formData.append('semester', currentSemester.folderName);
                    formData.append('semesterCode', currentSemester.code);
                    formData.append('timestamp', new Date().toISOString());

                    if (hasBuktiFile) {
                        formData.append('fileBuktiSubmit', fileBuktiSubmit.files[0]);
                        formData.append('fileBuktiSubmitName', fileBuktiSubmit.files[0].name);
                    }
                    if (hasLoAFile) {
                        formData.append('fileLoA', fileLoA.files[0]);
                        formData.append('fileLoAName', fileLoA.files[0].name);
                    }

                    let response;
                    try {
                        response = await fetch(GAS_WEBAPP_URL, { 
                            method: 'POST', 
                            body: formData
                        });
                    } catch (netErr) {
                        saveToLocalStorage({ 
                            namaLengkap, nim, 
                            semester: currentSemester.folderName, 
                            timestamp: new Date().toISOString(), 
                            hasBuktiFile, hasLoAFile 
                        });
                        throw new Error('Gagal terhubung ke server. Data disimpan lokal & akan dikirim ulang saat koneksi tersedia.');
                    }

                    if (!response.ok) throw new Error(`Server error: ${response.status}`);
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        modalDetail.innerHTML = `
                            <strong>📁 Semester:</strong> ${escapeHTML(currentSemester.label)}<br>
                            <strong>👤 Nama:</strong> ${escapeHTML(namaLengkap)}<br>
                            <strong>🆔 NIM:</strong> ${escapeHTML(nim)}<br>
                            ${hasBuktiFile ? '<strong>📄 Bukti Submit:</strong> ✅ Terunggah<br>' : ''}
                            ${hasLoAFile ? '<strong>📄 LoA:</strong> ✅ Terunggah<br>' : ''}
                            ${linkSintaVal ? '<strong>🔗 Link Sinta:</strong> ✅ Tercatat<br>' : ''}
                            ${linkJurnalLoAVal ? '<strong>🔗 Link Jurnal:</strong> ✅ Tercatat<br>' : ''}
                            <strong>⏰ Waktu:</strong> ${new Date().toLocaleString('id-ID')}
                        `;
                        successModal.classList.add('active');
                        resetForm();
                        clearLocalStorage();
                        showToast('✅ Berhasil! Dokumen tersimpan.', 'success-toast');
                    } else {
                        throw new Error(result.message || 'Gagal menyimpan data.');
                    }
                } catch (error) {
                    showToast('❌ ' + error.message, 'error-toast');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                    loadingOverlay.classList.remove('active');
                }
            });

            function saveToLocalStorage(data) {
                try {
                    const pending = JSON.parse(localStorage.getItem('pendingUploads') || '[]');
                    pending.push({ ...data, savedAt: new Date().toISOString() });
                    if (pending.length > 20) pending.shift();
                    localStorage.setItem('pendingUploads', JSON.stringify(pending));
                } catch (e) {
                    console.warn('Gagal menyimpan ke localStorage:', e);
                }
            }

            function clearLocalStorage() {
                try { localStorage.removeItem('pendingUploads'); } catch (e) {}
            }

            function resetForm() {
                document.getElementById('namaLengkap').value = '';
                nimInput.value = '';
                nimInput.classList.remove('error', 'success');
                nimError.classList.remove('show');
                document.getElementById('judulTesis').value = '';
                document.getElementById('judulArtikel').value = '';
                document.getElementById('linkSinta').value = '';
                document.getElementById('namaJurnal').value = '';
                document.getElementById('linkJurnalLoA').value = '';
                clearFileUpload(fileBuktiSubmit, uploadAreaBukti, previewBukti, previewBuktiContent);
                clearFileUpload(fileLoA, uploadAreaLoA, previewLoA, previewLoAContent);
                document.getElementById('formContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            // ============================================================
            // MODAL
            // ============================================================
            modalCloseBtn.addEventListener('click', () => successModal.classList.remove('active'));
            successModal.addEventListener('click', function(e) {
                if (e.target === successModal) successModal.classList.remove('active');
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && successModal.classList.contains('active')) {
                    successModal.classList.remove('active');
                }
            });

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============================================================
            // INIT
            // ============================================================
            console.log('✨ Form Upload Bukti Jurnal & LoA - Ready');
            console.log('📅 Semester:', currentSemester.label);
            console.log('🔗 GAS URL:', GAS_WEBAPP_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL_HERE' ? 
                '⚠️ BELUM DIKONFIGURASI - Ganti dengan URL Web App Anda' : '✅ Terhubung');
        })();
    </script>
</body>
</html>
